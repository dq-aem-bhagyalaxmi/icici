<sly data-sly-use.clientlib="core/wcm/components/commons/v1/templates/clientlib.html">
    <sly data-sly-call="${clientlib.all @ categories='icici.herobanner.navtabs'}"/>
</sly>

<sly data-sly-use.model="com.aem.icici.core.models.HeroBannerNavTabsModel"/>

<div class="hero-banner-tabs">
    <ul class="tab-list" data-sly-list.tab="${model.links}">

        <sly data-sly-test="${tabList.first}">
            <li class="curve-left"></li> <!-- Left curve before first tab -->
        </sly>

        <li class="tab-list-item ${tabList.first ? 'first' : ''}">
            <a href="${tab.linkPath}.html" class="tab-item">
                ${tab.label}
                <sly data-sly-test="${!tabList.last}">
                    <span class="tab-joiner"></span> <!-- Add joiner if not last tab -->
                </sly>
            </a>
        </li>

        <sly data-sly-test="${tabList.index == 0}">
            <li class="curve-right"></li> <!-- Right curve after first tab -->
        </sly>

    </ul>
</div>
