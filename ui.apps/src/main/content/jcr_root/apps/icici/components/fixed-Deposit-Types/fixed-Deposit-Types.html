
<!-- 
    Fixed Deposit Types Component
    - Uses a custom model 'FixedDepositTypes' to get title and icon image.
    - Integrates AEM Core Tabs Component to handle tab functionality.
-->

<!-- Import the custom model for title and icon -->
<sly data-sly-use.model="com.aem.icici.core.models.FixedDepositTypes" />

<!-- Load Google Font: Muli -->
<link href="https://fonts.googleapis.com/css2?family=Muli:wght@400;700&display=swap" rel="stylesheet">

<!-- Include the clientli CSS specific to this component -->
<sly data-sly-use.clientlib="/libs/granite/sightly/templates/clientlib.html" />
<sly data-sly-call="${clientlib.css @ categories='icici.fixedDeposit'}" />

<!-- Component Main Title -->
<h2 class="main-title">${model.title}</h2>

<!-- Tabs Wrapper -->
<div class="icici_tab">

    <!-- 
        Core Tabs Component Integration
        - Fetches tabs using the core component model
        - Includes editable placeholder in author mode
        - Displays tab headers and content dynamically
    -->
    <div data-sly-use.tabs="com.adobe.cq.wcm.core.components.models.Tabs"
         data-sly-use.templates="core/wcm/components/commons/v1/templates.html"
         data-panelcontainer="${wcmmode.edit && 'tabs'}"
         id="${tabs.id}"
         class="cmp-tabs"
         data-cmp-is="tabs"
         data-cmp-data-layer="${tabs.data.json}"
         data-placeholder-text="${wcmmode.edit && 'Please drag Tab components here' @ i18n}">

        <!-- Render Tab Headers if Tabs Exist -->
        <ol data-sly-test="${tabs.items && tabs.items.size > 0}"
            data-sly-list.tab="${tabs.items}"
            role="tablist"
            class="cmp-tabs__tablist"
            aria-label="${tabs.accessibilityLabel}"
            aria-multiselectable="false">

            <!-- Set active tab -->
            <sly data-sly-test.isActive="${tab.name == tabs.activeItem}"/>

            <!-- Individual Tab Header -->
            <li role="tab"
                id="${tab.id}-tab"
                class="cmp-tabs__tab${isActive ? ' cmp-tabs__tab--active' : ''}"
                aria-controls="${tab.id}-tabpanel"
                tabindex="${isActive ? '0' : '-1'}"
                data-cmp-hook-tabs="tab">

                <!-- Custom Tab Layout: Icon + Title -->
                <div class="tab-item">
                    <div class="tab-icon">
                        <img src="${model.iconImageReference}" alt="Icon from DAM" />
                    </div>
                    <div class="tab-title">
                        ${tab.title}
                    </div>
                </div>
            </li>
        </ol>

        <!-- Tab Panels: Dynamically renders the content of each tab -->
        <div data-sly-repeat.item="${tabs.items}"
             data-sly-resource="${item.name @ decorationTagName='div'}"
             id="${item.id}-tabpanel"
             role="tabpanel"
             aria-labelledby="${item.id}-tab"
             tabindex="0"
             class="cmp-tabs__tabpanel${item.name == tabs.activeItem ? ' cmp-tabs__tabpanel--active' : ''}"
             data-cmp-hook-tabs="tabpanel"
             data-cmp-data-layer="${item.data.json}">
        </div>

        <!-- Author Mode Placeholder: Shown when no tab content exists -->
        <sly data-sly-resource="${resource.path @ resourceType='wcm/foundation/components/parsys/newpar', appendPath='/*', decorationTagName='div', cssClassName='new section aem-Grid-newComponent'}"
             data-sly-test="${(wcmmode.edit || wcmmode.preview) && tabs.items.size < 1}">
        </sly>
    </div>

</div>
