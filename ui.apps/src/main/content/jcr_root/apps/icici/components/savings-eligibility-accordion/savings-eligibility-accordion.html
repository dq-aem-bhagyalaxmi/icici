<sly data-sly-use.clientlib="/libs/granite/sightly/templates/clientlib.html"/>
<sly data-sly-call="${clientlib.all @ categories='icici.savings.eligibilityaccordion'}"/>

<sly data-sly-use.model="com.aem.icici.core.models.SavingsPageEligibilityAccordionModel" />

<div class="custom-accordion">
    <!-- Main Heading -->
    <div class="accordion-header">
        <h2>${model.mainHeading}</h2>
    </div>

    <div class="accordion-body">
        <!-- First Section -->
        <section class="documentation">
            <h3>${model.firstSectionTitle}</h3>
            <div data-sly-unwrap>${model.firstSectionContent @ context="html"}</div>
        </section>

        <div class="arrow"></div>

        <!-- Second Section -->
        <section class="charges">
            <h3>${model.secondSectionTitle}</h3>
            <div data-sly-unwrap>${model.secondSectionContent @ context="html"}</div>
        </section>
    </div>

    <button class="toggle-button">READ MORE</button>
</div>
