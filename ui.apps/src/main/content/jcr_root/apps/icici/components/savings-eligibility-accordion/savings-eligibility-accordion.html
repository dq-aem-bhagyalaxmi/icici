<sly data-sly-use.clientlib="/libs/granite/sightly/templates/clientlib.html"/>
<sly data-sly-call="${clientlib.all @ categories='icici.savings.eligibilityaccordion'}"/>

<div class="custom-accordion">
    <div class="accordion-header">
        <h2>Eligibility and Documents Required for Opening a Savings Account Online</h2>
    </div>

    <div class="accordion-body">
        <section class="documentation">
            <h3>Documentation & Eligibility</h3>
            <ul>
                <li>PAN Card and Aadhaar Card for the account opening process</li>
                <li>Indian resident of any age group</li>
            </ul>
        </section>
        <div class="arrow"></div>
        <section class="charges">
            <h3>Schedule of Charges</h3>
            <p>Learn in detail about <a href="#">Service Charges for Savings Account</a></p>
        </section>
    </div>
    <button class="toggle-button">READ MORE</button>
</div>
