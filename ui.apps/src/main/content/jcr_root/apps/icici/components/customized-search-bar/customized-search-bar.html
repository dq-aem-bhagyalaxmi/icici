<sly data-sly-use.model="com.aem.icici.core.models.CustomizedSearchBarModel" />
<sly data-sly-use.clientlib="core/wcm/components/commons/v1/templates/clientlib.html">
    <sly data-sly-call="${clientlib.css @ categories='icici.customizedsearchbar'}"/>
</sly>

<div class="search-bar">
    <img class="left-icon" src="${model.leftIconRef}" alt="Left Icon" />
    <input class="search-input" type="text" placeholder="${model.placeholder}" />

    <!-- Vertical Line Divider -->
    <div class="vertical-line"></div>

    <img class="right-icon" src="${model.rightIconRef}" alt="Mic Icon" />
</div>
