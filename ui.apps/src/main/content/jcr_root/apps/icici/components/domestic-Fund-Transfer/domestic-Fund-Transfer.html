<sly data-sly-use.model="com.aem.icici.core.models.DomesticFundTransferModel" />
<link href="https://fonts.googleapis.com/css2?family=Muli:wght@400;700&display=swap" rel="stylesheet">

<div class="domestic-fund-section">
	<div class="Main-title">
    	<h2>${model.sectionTitle}</h2>
  	</div>

    <div class="card-grid">
        <sly data-sly-list.card="${model.cardItems}">
            <div class="card">
                <div class="card-inner" style="--hover-bg: ${card.backgroundColor @ context='styleString'};">
                    <div class="card-front">
                        <img src="${card.iconImageReference}" alt="${card.cardTitle}" class="card-icon"/>
                        <h3 class="card-title">${card.cardTitle}</h3>
                    </div>
                    <div class="card-back">
                        <h3 class="hover-title">${card.hoverTitle}</h3>
                        <div class="hover-description">${card.hoverDescription @ context='html'}</div>
                        <div>
                        	<img src="${card.backgroundImageReference}" alt="${card.cardTitle}" class="card-icon"/>
                        </div>
                    </div>
                </div>
            </div>
        </sly>
    </div>
</div>


<style>

.domestic-fund-section {
  padding: 40px 20px;
  background-color: #f9f9f9;
  font-family: 'Muli', sans-serif;
}

.Main-title h2 {
  text-align: center;
  font-size: 28px;
  margin-bottom: 30px;
  color: #333;
}

.card-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  width: 240px;
  height: 300px;
  perspective: 1000px;
}

.card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.6s;
  transform-style: preserve-3d;
}

.card:hover .card-inner {
  transform: rotateY(180deg);
}

.card-front,
.card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 8px;
  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  overflow: hidden;
}

.card-front {
  background-color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.card-icon {
  width: 60px;
  height: 60px;
  margin-bottom: 15px;
}

.card-title {
  font-size: 18px;
  color: #333;
  text-align: center;
}

.card-back {
  background-size: cover;
  background-position: center;
  transform: rotateY(180deg);
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(176.75deg, #f37e20 .65%, #ad1e23 98.63%);
    width: 100%;
    height: 100%;
    opacity: 0;
    position: absolute;
    transition: all .5s;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
}

.card-back .overlay {
  background-color: rgba(0, 0, 0, 0.6);
  padding: 20px;
  text-align: center;
  color: #fff;



}

.hover-title {
  font-size: 20px;
  margin-bottom: 10px;
}

.hover-description {
  font-size: 14px;
  line-height: 1.4;
}

</style>
