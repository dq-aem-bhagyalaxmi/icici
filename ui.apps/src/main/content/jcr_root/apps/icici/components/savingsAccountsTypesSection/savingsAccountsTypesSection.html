

<sly data-sly-use.clientlib="/libs/granite/sightly/templates/clientlib.html"/>
<sly data-sly-call="${clientlib.all @ categories='icici.savingsAccountsSection'}"/>

<div data-sly-use.model="com.aem.icici.core.models.SavingsAccountsTypesSectionModel" class="savings-accounts-section">

    <h2 class="section-title">${model.sectionTitle @context='html'}</h2>

    <div class="accounts-grid" data-sly-list.item="${model.accountItems}">
        <div class="account-card">
            <a href="${item.accountImagePath}">
                <img src="${item.fileReference @context='uri'}" alt="${item.accountTitle @context='html'}" class="account-image"/>
                <h3 class="account-title">${item.accountTitle @context='html'}</h3>
            </a>
        </div>
    </div>

</div>
