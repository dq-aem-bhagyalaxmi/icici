<sly data-sly-use.clientlib="/libs/granite/sightly/templates/clientlib.html"/>
<sly data-sly-call="${clientlib.all @ categories='icici.savings.faq'}"/>

<h2 class="faq-heading">Savings Account FAQs</h2>

<div class="faq-section" id="${resource.id}">
    <div class="faq-controls">
        <button type="button" class="faq-toggle-btn" onclick="expandAllFaqs()">Expand All</button>
        |
        <button type="button" class="faq-toggle-btn" onclick="collapseAllFaqs()">Collapse All</button>
    </div>

    <sly data-sly-resource="${resource @ resourceType='core/wcm/components/accordion/v1/accordion'}"></sly>

</div>
