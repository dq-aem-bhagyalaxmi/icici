<sly data-sly-use.clientlib="core/wcm/components/commons/v1/templates/clientlib.html" >
    <sly data-sly-call="${clientlib.css @ categories='icici.complaints_sub_tab'}" />
</sly>

<sly data-sly-use.model="com.aem.icici.core.models.ComplaintsSubTabModel" />
  <div class="complaints-container">

	<div class="complaints-sub-container">	

        <h1 class="complaints-title">${model.title}</h1>
        <p class="complaints-para">${model.text}</p>
        

        <div class="complaints_sub_tab">
            <sly data-sly-resource="${resource1 @ resourceType='core/wcm/components/tabs/v1/tabs'}"></sly>
        </div>
	</div>




	<div class="footer-container">

        <div class="footer-left-side" data-sly-list.footerleftlist="${model.footerleft}">
            <a href="${footerleftlist.link}">${footerleftlist.text2 @context='html'}</a>
        </div>
    
        <div class="footer-right-container">
            <h1 class="footer-right-title">${model.title2}</h1>
            <div class="footer-right-side" data-sly-list.footerrightlist="${model.footerright}">
                <a href="${footerrightlist.link3}">${footerrightlist.text3}</a>
           </div>

    	</div>
   	</div>     
</div>
