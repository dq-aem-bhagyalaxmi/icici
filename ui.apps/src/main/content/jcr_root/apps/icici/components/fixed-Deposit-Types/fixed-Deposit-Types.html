
<sly data-sly-use.model="com.aem.icici.core.models.FixedDepositTypesModel" />

<!-- Include client libraries for CSS (Correct Usage) -->
<sly data-sly-use.clientlib="/libs/granite/sightly/templates/clientlib.html" />
<sly data-sly-call="${clientlib.css @ categories='icici.fixedDeposit'}" />

<h2 class="main-title">${model.title}</h2>

<!-- Tabs Component -->
<div class="icici_tab">
    <sly data-sly-resource="${resource @ resourceType='core/wcm/components/tabs/v1/tabs'}">
        <div class="tab-item">
            <!-- Render the icon from the Sling Model -->
            <div class="tab-icon">
                <img src="${model.iconImageReference}" alt="Icon from DAM" />
            </div>
            <!-- Tab content rendered by the tabs component -->
            <div class="tab-content">
                <sly data-sly-resource="${tabResource}"></sly>
            </div>
        </div>
    </sly>
</div>
